<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Memory Odyssey | Progressive Memory Game</title>
  <!-- Tailwind + Font Awesome -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css">
 
</head>

<body
  class="bg-gradient-to-br from-indigo-400 via-purple-400 to-pink-400 min-h-screen flex flex-col items-center justify-center p-3 md:p-5 transition-colors duration-300">

  <div class="w-full max-w-5xl mx-auto">
    <!-- Header & Theme toggle -->
    <div class="flex justify-between items-center mb-3 flex-wrap gap-3">
      <h1 class="text-3xl md:text-5xl font-extrabold text-white drop-shadow-lg flex items-center gap-3">
        <i class="fa-solid fa-brain text-yellow-200"></i> Memory Odyssey
      </h1>
      <button id="themeToggle"
        class="bg-white/30 backdrop-blur-sm text-white rounded-full w-12 h-12 flex items-center justify-center text-xl hover:bg-white/50 transition-all shadow-lg">
        <i id="themeIcon" class="fas fa-moon"></i>
      </button>
    </div>

    <!-- Difficulty Levels Section: Easy, Medium, Hard -->
    <div class="flex flex-wrap justify-center gap-3 mb-6 bg-white/20 backdrop-blur-sm p-3 rounded-2xl">
      <button data-diff="easy"
        class="difficulty-btn px-6 py-2 rounded-full font-bold bg-white text-indigo-700 shadow-md transition-all active">🌱
        EASY (4x3)</button>
      <button data-diff="medium"
        class="difficulty-btn px-6 py-2 rounded-full font-bold bg-white text-indigo-700 shadow-md transition-all">⚡
        MEDIUM (4x4)</button>
      <button data-diff="hard"
        class="difficulty-btn px-6 py-2 rounded-full font-bold bg-white text-indigo-700 shadow-md transition-all">🔥
        HARD (6x4)</button>
    </div>

    <!-- Stats & Restart panel -->
    <div class="flex flex-col sm:flex-row justify-between items-center gap-3 mb-6">
      <div class="flex gap-4">
        <div class="stat-panel bg-white/30 backdrop-blur rounded-xl px-5 py-2 text-white font-bold shadow">
          <i class="fas fa-hand-peace mr-1"></i> Moves: <span id="moves">0</span>
        </div>
        <div class="stat-panel bg-white/30 backdrop-blur rounded-xl px-5 py-2 text-white font-bold shadow">
          <i class="fas fa-hourglass-half mr-1"></i> Time: <span id="time">0s</span>
        </div>
        <div class="stat-panel bg-white/30 backdrop-blur rounded-xl px-5 py-2 text-white font-bold shadow">
          <i class="fas fa-layer-group mr-1"></i> Level: <span id="levelIndicator">1/3</span>
        </div>
      </div>
      <button id="restartBtn"
        class="restart-btn bg-white text-indigo-700 hover:bg-indigo-100 font-bold py-2 px-6 rounded-xl shadow-lg transition-all">
        <i class="fas fa-arrows-rotate mr-2"></i> Restart Level
      </button>
    </div>

    <!-- Game Board Container -->
    <div id="game-board" class="game-grid flex justify-center"></div>

    <!-- Win Modal (Progression Modal) -->
    <div id="win-modal"
      class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 transition-all">
      <div
        class="win-modal-content bg-white rounded-2xl p-8 max-w-md w-full mx-4 text-center shadow-2xl transform transition-all">
        <i class="fas fa-trophy text-5xl text-yellow-500 mb-3"></i>
        <h2 class="text-3xl font-extrabold text-indigo-600 mb-2">Level Complete!</h2>
        <p class="text-lg mb-2">You cleared in <span id="finalMovesSpan" class="font-bold">0</span> moves</p>
        <p class="text-lg mb-4">Time: <span id="finalTimeSpan" class="font-bold">0s</span></p>
        <div id="nextLevelInfo" class="mb-5 text-md font-medium text-gray-700"></div>
        <button id="nextLevelBtn"
          class="bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 text-white font-bold py-3 px-8 rounded-xl transition-all shadow-lg w-full">
          <i class="fas fa-arrow-right mr-2"></i> Next Level
        </button>
        <button id="cancelModalBtn" class="mt-3 text-gray-500 hover:text-gray-700 text-sm">Stay & Review</button>
      </div>
    </div>

    <!-- Final Victory Modal (All levels done) -->
    <div id="victory-modal"
      class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50">
      <div
        class="bg-gradient-to-br from-yellow-100 to-orange-100 dark:from-gray-800 dark:to-gray-900 rounded-2xl p-8 max-w-md w-full text-center shadow-2xl">
        <i class="fas fa-crown text-6xl text-yellow-500 mb-3"></i>
        <h2 class="text-3xl font-black text-purple-700 dark:text-purple-300">🏆 MASTER MEMORY 🏆</h2>
        <p class="text-xl my-3">You conquered all 3 levels!</p>
        <p class="mb-4">Total brilliance unlocked ✨</p>
        <button id="fullResetBtn"
          class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl mt-2 w-full transition">Play
          Again from Easy</button>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>

</html>
