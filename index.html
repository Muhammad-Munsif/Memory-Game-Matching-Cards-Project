<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Game</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    /* Custom styles to complement Tailwind */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .card {
      perspective: 1000px;
      transform-style: preserve-3d;
      transition: all 0.5s ease;
      cursor: pointer;
      aspect-ratio: 1;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.5s;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front,
    .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .card-front {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      transform: rotateY(180deg);
      color: white;
      font-size: 2rem;
    }

    .card-back {
      background: white;
      transform: rotateY(0deg);
    }

    .card.matched {
      opacity: 0.5;
      cursor: default;
    }

    /* Animation for matched cards */
    @keyframes matchedAnimation {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.1);
      }

      100% {
        transform: scale(1);
      }
    }

    .card.matched .card-front {
      animation: matchedAnimation 0.5s ease;
    }
  </style>
</head>

<body class="bg-gradient-to-br from-blue-500 to-purple-600 min-h-screen flex flex-col items-center justify-center p-4">
  <div class="w-full max-w-4xl mx-auto">
    <h1 class="text-3xl md:text-4xl font-bold text-white text-center mb-2">
      Memory Game
    </h1>
    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
      <div class="flex items-center gap-4">
        <div class="bg-white bg-opacity-20 rounded-lg p-3 text-white">
          <span class="font-bold">Moves: </span>
          <span id="moves">0</span>
        </div>
        <div class="bg-white bg-opacity-20 rounded-lg p-3 text-white">
          <span class="font-bold">Time: </span>
          <span id="time">0s</span>
        </div>
      </div>
      <button id="restart"
        class="bg-white text-blue-600 hover:bg-blue-100 font-bold py-2 px-4 rounded-lg transition-all">
        <i class="fas fa-redo mr-2"></i>Restart
      </button>
    </div>

    <div id="game-board" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3 md:gap-4"></div>

    <div id="win-message" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50">
      <div class="bg-white rounded-lg p-8 max-w-md w-full mx-4 text-center">
        <h2 class="text-2xl font-bold text-blue-600 mb-4">
          Congratulations!
        </h2>
        <p class="mb-2">
          You won in <span id="final-moves" class="font-bold">0</span> moves!
        </p>
        <p class="mb-6">
          Time: <span id="final-time" class="font-bold">0s</span>
        </p>
        <button id="play-again"
          class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition-all">
          Play Again
        </button>
      </div>
    </div>
  </div>

  <script src="js/script.js">
    document.addEventListener("DOMContentLoaded", () => {
  const gameBoard = document.getElementById("game-board");
  const movesDisplay = document.getElementById("moves");
  const timeDisplay = document.getElementById("time");
  const restartButton = document.getElementById("restart");
  const winMessage = document.getElementById("win-message");
  const playAgainButton = document.getElementById("play-again");
  const finalMovesDisplay = document.getElementById("final-moves");
  const finalTimeDisplay = document.getElementById("final-time");

  // Game variables
  let cards = [];
  let hasFlippedCard = false;
  let lockBoard = false;
  let firstCard, secondCard;
  let moves = 0;
  let timer = null;
  let seconds = 0;
  let matchedPairs = 0;
  const totalPairs = 6; // For a 6x2 grid (12 cards)

  // Emoji icons for cards (6 pairs)
  const emojis = [
    "🐶",
    "🐱",
    "🐭",
    "🐹",
    "🐰",
    "🦊",
    "🐻",
    "🐼",
    "🐨",
    "🐯",
    "🦁",
    "🐮",
  ];

  // Initialize game
  function initGame() {
    // Reset game state
    moves = 0;
    seconds = 0;
    matchedPairs = 0;
    movesDisplay.textContent = moves;
    timeDisplay.textContent = `${seconds}s`;
    clearInterval(timer);
    timer = null;

    // Create cards
    cards = [];
    gameBoard.innerHTML = "";

    // Select 6 random emojis and duplicate them for pairs
    const selectedEmojis = [...emojis]
      .sort(() => 0.5 - Math.random())
      .slice(0, totalPairs);
    const gameEmojis = [...selectedEmojis, ...selectedEmojis];

    // Shuffle cards
    gameEmojis.sort(() => 0.5 - Math.random());

    // Create card elements
    gameEmojis.forEach((emoji, index) => {
      const card = document.createElement("div");
      card.classList.add("card");
      card.dataset.index = index;

      card.innerHTML = `
                <div class="card-inner">
                    <div class="card-front">${emoji}</div>
                    <div class="card-back"></div>
                </div>
            `;

      card.addEventListener("click", flipCard);
      gameBoard.appendChild(card);
      cards.push(card);
    });
  }
  // Flip card function
  function flipCard() {
    if (lockBoard) return;
    if (this === firstCard) return;
    if (this.classList.contains("matched")) return;

    // Start timer on first move
    if (!timer && moves === 0) {
      startTimer();
    }

    this.classList.add("flipped");

    if (!hasFlippedCard) {
      // First click
      hasFlippedCard = true;
      firstCard = this;
      return;
    }

    // Second click
    secondCard = this;
    moves++;
    movesDisplay.textContent = moves;

    checkForMatch();
  }

  // Check for match
  function checkForMatch() {
    const isMatch =
      firstCard.querySelector(".card-front").textContent ===
      secondCard.querySelector(".card-front").textContent;

    if (isMatch) {
      disableCards();
      matchedPairs++;

      // Check for win
      if (matchedPairs === totalPairs) {
        endGame();
      }
    } else {
      unflipCards();
    }
  }

  // Disable matched cards
  function disableCards() {
    firstCard.classList.add("matched");
    secondCard.classList.add("matched");
    firstCard.removeEventListener("click", flipCard);
    secondCard.removeEventListener("click", flipCard);

    resetBoard();
  }

  // Unflip unmatched cards
  function unflipCards() {
    lockBoard = true;

    setTimeout(() => {
      firstCard.classList.remove("flipped");
      secondCard.classList.remove("flipped");

      resetBoard();
    }, 1000);
  }

  // Reset board state
  function resetBoard() {
    [hasFlippedCard, lockBoard] = [false, false];
    [firstCard, secondCard] = [null, null];
  }

  // Timer functions
  function startTimer() {
    timer = setInterval(() => {
      seconds++;
      timeDisplay.textContent = `${seconds}s`;
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timer);
  }

  // End game
  function endGame() {
    stopTimer();
    finalMovesDisplay.textContent = moves;
    finalTimeDisplay.textContent = `${seconds}s`;
    winMessage.classList.remove("hidden");
  }

  // Event listeners
  restartButton.addEventListener("click", () => {
    initGame();
  });

  playAgainButton.addEventListener("click", () => {
    winMessage.classList.add("hidden");
    initGame();
  });

  // Initialize the game
  initGame();
});

  </script>
</body>

</html>
