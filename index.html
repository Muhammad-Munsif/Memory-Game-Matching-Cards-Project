<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Memory Odyssey | Progressive Memory Game</title>
  <!-- Tailwind + Font Awesome -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Custom smooth transitions & card 3D effect */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      transition: background-color 0.3s ease, color 0.2s ease;
    }

    /* Dark mode overrides (applied via .dark-mode class on body) */
    body.dark-mode {
      background: linear-gradient(135deg, #0f172a, #1e1a2f) !important;
    }

    body.dark-mode .game-container-card {
      background-color: rgba(30, 41, 59, 0.9);
      backdrop-filter: blur(4px);
    }

    body.dark-mode .stat-panel {
      background-color: rgba(0, 0, 0, 0.5);
      color: #f1f5f9;
    }

    body.dark-mode .card-back {
      background: linear-gradient(145deg, #334155, #1e293b);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
    }

    body.dark-mode .difficulty-btn {
      background: #1e293b;
      color: #cbd5e1;
      border-color: #475569;
    }

    body.dark-mode .difficulty-btn.active {
      background: #3b82f6;
      color: white;
      border-color: #3b82f6;
    }

    body.dark-mode .restart-btn {
      background: #334155;
      color: #e2e8f0;
    }

    body.dark-mode .win-modal-content {
      background: #1e293b;
      color: #f1f5f9;
    }

    .card {
      perspective: 1200px;
      transform-style: preserve-3d;
      cursor: pointer;
      aspect-ratio: 1 / 1;
      transition: all 0.2s ease;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(0.23, 1, 0.32, 1);
      border-radius: 1rem;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front,
    .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }

    .card-front {
      background: linear-gradient(145deg, #facc15, #f97316);
      transform: rotateY(180deg);
      color: #2d2b1f;
      font-weight: bold;
    }

    .card-back {
      background: linear-gradient(145deg, #ffffff, #f3f4f6);
      transform: rotateY(0deg);
      border: 2px solid rgba(59, 130, 246, 0.3);
    }

    body.dark-mode .card-front {
      background: linear-gradient(145deg, #eab308, #d97706);
      color: #0f172a;
    }

    .card.matched {
      opacity: 0.65;
      cursor: default;
      filter: grayscale(0.1);
      transform: scale(0.97);
      transition: all 0.2s;
    }

    .card.matched .card-front {
      animation: matchPulse 0.5s ease;
    }

    @keyframes matchPulse {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.08);
        box-shadow: 0 0 15px gold;
      }

      100% {
        transform: scale(1);
      }
    }

    /* Responsive grid adjustments */
    .game-grid {
      display: grid;
      gap: 0.75rem;
      justify-content: center;
      margin-top: 0.5rem;
    }

    /* dynamic grid columns based on difficulty */
    .grid-easy {
      grid-template-columns: repeat(4, minmax(70px, 95px));
    }

    .grid-medium {
      grid-template-columns: repeat(4, minmax(70px, 90px));
    }

    .grid-hard {
      grid-template-columns: repeat(6, minmax(70px, 85px));
    }

    @media (max-width: 640px) {

      .grid-easy,
      .grid-medium {
        grid-template-columns: repeat(4, minmax(65px, 80px));
      }

      .grid-hard {
        grid-template-columns: repeat(4, minmax(70px, 85px));
      }
    }

    @media (min-width: 768px) {
      .grid-easy {
        grid-template-columns: repeat(4, minmax(90px, 110px));
      }

      .grid-medium {
        grid-template-columns: repeat(4, minmax(100px, 120px));
      }

      .grid-hard {
        grid-template-columns: repeat(6, minmax(85px, 105px));
      }
    }

    .difficulty-btn {
      transition: all 0.2s;
      border-width: 1px;
    }

    .difficulty-btn.active {
      background: #3b82f6;
      color: white;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
    }

    .stat-panel {
      backdrop-filter: blur(4px);
      transition: all 0.2s;
    }
  </style>
</head>

<body
  class="bg-gradient-to-br from-indigo-400 via-purple-400 to-pink-400 min-h-screen flex flex-col items-center justify-center p-3 md:p-5 transition-colors duration-300">
  <div class="w-full max-w-5xl mx-auto">
    <!-- Header & Theme toggle -->
    <div class="flex justify-between items-center mb-3 flex-wrap gap-3">
      <h1 class="text-3xl md:text-5xl font-extrabold text-white drop-shadow-lg flex items-center gap-3">
        <i class="fa-solid fa-brain text-yellow-200"></i> Memory Odyssey
      </h1>
      <button id="themeToggle"
        class="bg-white/30 backdrop-blur-sm text-white rounded-full w-12 h-12 flex items-center justify-center text-xl hover:bg-white/50 transition-all shadow-lg">
        <i id="themeIcon" class="fas fa-moon"></i>
      </button>
    </div>

    <!-- Difficulty Levels Section: Easy, Medium, Hard -->
    <div class="flex flex-wrap justify-center gap-3 mb-6 bg-white/20 backdrop-blur-sm p-3 rounded-2xl">
      <button data-diff="easy"
        class="difficulty-btn px-6 py-2 rounded-full font-bold bg-white text-indigo-700 shadow-md transition-all active">🌱
        EASY (4x3)</button>
      <button data-diff="medium"
        class="difficulty-btn px-6 py-2 rounded-full font-bold bg-white text-indigo-700 shadow-md transition-all">⚡
        MEDIUM (4x4)</button>
      <button data-diff="hard"
        class="difficulty-btn px-6 py-2 rounded-full font-bold bg-white text-indigo-700 shadow-md transition-all">🔥
        HARD (6x4)</button>
    </div>
    <!-- Stats & Restart panel -->
    <div class="flex flex-col sm:flex-row justify-between items-center gap-3 mb-6">
      <div class="flex gap-4">
        <div class="stat-panel bg-white/30 backdrop-blur rounded-xl px-5 py-2 text-white font-bold shadow">
          <i class="fas fa-hand-peace mr-1"></i> Moves: <span id="moves">0</span>
        </div>
        <div class="stat-panel bg-white/30 backdrop-blur rounded-xl px-5 py-2 text-white font-bold shadow">
          <i class="fas fa-hourglass-half mr-1"></i> Time: <span id="time">0s</span>
        </div>
        <div class="stat-panel bg-white/30 backdrop-blur rounded-xl px-5 py-2 text-white font-bold shadow">
          <i class="fas fa-layer-group mr-1"></i> Level: <span id="levelIndicator">1/3</span>
        </div>
      </div>
      <button id="restartBtn"
        class="restart-btn bg-white text-indigo-700 hover:bg-indigo-100 font-bold py-2 px-6 rounded-xl shadow-lg transition-all">
        <i class="fas fa-arrows-rotate mr-2"></i> Restart Level
      </button>
    </div>

    <!-- Game Board Container -->
    <div id="game-board" class="game-grid flex justify-center"></div>

    <!-- Win Modal (Progression Modal) -->
    <div id="win-modal"
      class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 transition-all">
      <div
        class="win-modal-content bg-white rounded-2xl p-8 max-w-md w-full mx-4 text-center shadow-2xl transform transition-all">
        <i class="fas fa-trophy text-5xl text-yellow-500 mb-3"></i>
        <h2 class="text-3xl font-extrabold text-indigo-600 mb-2">Level Complete!</h2>
        <p class="text-lg mb-2">You cleared in <span id="finalMovesSpan" class="font-bold">0</span> moves</p>
        <p class="text-lg mb-4">Time: <span id="finalTimeSpan" class="font-bold">0s</span></p>
        <div id="nextLevelInfo" class="mb-5 text-md font-medium text-gray-700"></div>
        <button id="nextLevelBtn"
          class="bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 text-white font-bold py-3 px-8 rounded-xl transition-all shadow-lg w-full">
          <i class="fas fa-arrow-right mr-2"></i> Next Level
        </button>
        <button id="cancelModalBtn" class="mt-3 text-gray-500 hover:text-gray-700 text-sm">Stay & Review</button>
      </div>
    </div>

    <!-- Final Victory Modal (All levels done) -->
    <div id="victory-modal"
      class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50">
      <div
        class="bg-gradient-to-br from-yellow-100 to-orange-100 dark:from-gray-800 dark:to-gray-900 rounded-2xl p-8 max-w-md w-full text-center shadow-2xl">
        <i class="fas fa-crown text-6xl text-yellow-500 mb-3"></i>
        <h2 class="text-3xl font-black text-purple-700 dark:text-purple-300">🏆 MASTER MEMORY 🏆</h2>
        <p class="text-xl my-3">You conquered all 3 levels!</p>
        <p class="mb-4">Total brilliance unlocked ✨</p>
        <button id="fullResetBtn"
          class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl mt-2 w-full transition">Play
          Again from Easy</button>
      </div>
    </div>
  </div>
  <script src="js/script.js">
    

// ---------- GAME STATE ----------
let currentDifficulty = 'easy';    // 'easy', 'medium', 'hard'
let levelOrder = ['easy', 'medium', 'hard'];
let currentLevelIndex = 0;          // 0->easy, 1->medium, 2->hard

// Game dynamic vars
let cardsArray = [];
let hasFlippedCard = false;
let lockBoard = false;
let firstCard, secondCard;
let moves = 0;
let timerInterval = null;
let secondsElapsed = 0;
let matchedCount = 0;
let totalPairs = 0;
let gameActive = true;

// DOM Elements
const gameBoard = document.getElementById("game-board");
const movesSpan = document.getElementById("moves");
const timeSpan = document.getElementById("time");
const restartBtn = document.getElementById("restartBtn");
const winModal = document.getElementById("win-modal");
const victoryModal = document.getElementById("victory-modal");
const nextLevelBtn = document.getElementById("nextLevelBtn");
const cancelModalBtn = document.getElementById("cancelModalBtn");
const finalMovesSpan = document.getElementById("finalMovesSpan");
const finalTimeSpan = document.getElementById("finalTimeSpan");
const nextLevelInfo = document.getElementById("nextLevelInfo");
const levelIndicatorSpan = document.getElementById("levelIndicator");
const fullResetBtn = document.getElementById("fullResetBtn");
const themeToggle = document.getElementById("themeToggle");
const themeIcon = document.getElementById("themeIcon");

// Difficulty buttons
const diffBtns = document.querySelectorAll("[data-diff]");

// ----- Difficulty Config: grid size & emoji pool -----
const difficultyConfig = {
  easy: { rows: 3, cols: 4, totalCards: 12, pairs: 6, gridClass: "grid-easy" },
  medium: { rows: 4, cols: 4, totalCards: 16, pairs: 8, gridClass: "grid-medium" },
  hard: { rows: 4, cols: 6, totalCards: 24, pairs: 12, gridClass: "grid-hard" }
};

// Rich emoji set for variety
const emojiLibrary = [
  "🐶", "🐱", "🐭", "🐹", "🐰", "🦊", "🐻", "🐼", "🐨", "🐯", "🦁", "🐮",
  "🐸", "🐵", "🐔", "🐧", "🐦", "🐴", "🦋", "🐝", "🐳", "🐬", "🦄", "🐙",
  "🍎", "🍒", "🍉", "🍕", "⚽", "🏀", "🎈", "🚀", "🌈", "⭐", "❄️", "🎵"
];

// Helper: shuffle array (Fisher-Yates)
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Generate card data based on current difficulty
function generateCardData() {
  const cfg = difficultyConfig[currentDifficulty];
  const neededPairs = cfg.pairs;
  // pick random unique emojis from library
  let shuffledLib = [...emojiLibrary];
  shuffledLib = shuffleArray(shuffledLib);
  const selectedEmojis = shuffledLib.slice(0, neededPairs);
  // duplicate for pairs
  let deck = [...selectedEmojis, ...selectedEmojis];
  deck = shuffleArray(deck);
  return deck;
}

// Render game board from scratch
function buildBoard() {
  gameBoard.innerHTML = "";
  const cfg = difficultyConfig[currentDifficulty];
  const deck = generateCardData();
  totalPairs = cfg.pairs;
  matchedCount = 0;
  moves = 0;
  secondsElapsed = 0;
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  movesSpan.textContent = moves;
  timeSpan.textContent = "0s";
  hasFlippedCard = false;
  lockBoard = false;
  firstCard = secondCard = null;
  gameActive = true;

  // apply grid classes
  gameBoard.className = `game-grid ${cfg.gridClass}`;

  // create card elements
  cardsArray = [];
  deck.forEach((emoji, idx) => {
    const cardDiv = document.createElement("div");
    cardDiv.classList.add("card");
    cardDiv.setAttribute("data-idx", idx);
    cardDiv.setAttribute("data-emoji", emoji);

    const inner = document.createElement("div");
    inner.classList.add("card-inner");
    inner.innerHTML = `
          <div class="card-front">${emoji}</div>
          <div class="card-back"><i class="fas fa-question text-3xl text-gray-400"></i></div>
        `;
    cardDiv.appendChild(inner);
    cardDiv.addEventListener("click", () => handleCardClick(cardDiv));
    gameBoard.appendChild(cardDiv);
    cardsArray.push(cardDiv);
  });

  // update level text
  levelIndicatorSpan.textContent = `${currentLevelIndex + 1}/${levelOrder.length}`;
}

// Timer start on first move
function startTimerIfNeeded() {
  if (!timerInterval && gameActive && moves === 0) {
    timerInterval = setInterval(() => {
      if (gameActive) {
        secondsElapsed++;
        timeSpan.textContent = `${secondsElapsed}s`;
      }
    }, 1000);
  }
}

function stopTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
}

function handleCardClick(card) {
  // ignore if board locked, already matched, already flipped same card, or game inactive
  if (lockBoard || !gameActive) return;
  if (card.classList.contains("matched")) return;
  if (card.classList.contains("flipped") && hasFlippedCard && firstCard === card) return;

  // start timer on first interaction
  startTimerIfNeeded();

  // first flip
  if (!hasFlippedCard) {
    card.classList.add("flipped");
    hasFlippedCard = true;
    firstCard = card;
    return;
  }

  // second card (different)
  secondCard = card;
  card.classList.add("flipped");
  moves++;
  movesSpan.textContent = moves;

  // check match
  const emoji1 = firstCard.getAttribute("data-emoji");
  const emoji2 = secondCard.getAttribute("data-emoji");
  const isMatch = (emoji1 === emoji2);

  if (isMatch) {
    // matched
    firstCard.classList.add("matched");
    secondCard.classList.add("matched");
    // remove click listener implicitly by class check, but we keep event but matched class prevents re-flip
    matchedCount++;
    resetBoardState();

    // check level completion
    if (matchedCount === totalPairs) {
      levelComplete();
    }
  } else {
    // no match: lock board, flip back after delay
    lockBoard = true;
    setTimeout(() => {
      if (firstCard) firstCard.classList.remove("flipped");
      if (secondCard) secondCard.classList.remove("flipped");
      resetBoardState();
      lockBoard = false;
    }, 800);
  }
}

function resetBoardState() {
  hasFlippedCard = false;
  firstCard = null;
  secondCard = null;
}

function levelComplete() {
  // stop timer, show modal
  if (!gameActive) return;
  gameActive = false;
  stopTimer();

  // Show win modal with progression
  finalMovesSpan.textContent = moves;
  finalTimeSpan.textContent = `${secondsElapsed}s`;

  // determine if there is next level
  const isLastLevel = (currentLevelIndex === levelOrder.length - 1);
  if (isLastLevel) {
    nextLevelInfo.innerHTML = "✨ You've mastered every difficulty! ✨<br>Complete victory awaits!";
    nextLevelBtn.innerHTML = '<i class="fas fa-crown mr-2"></i> Claim Victory';
  } else {
    const nextLevelName = levelOrder[currentLevelIndex + 1].toUpperCase();
    nextLevelInfo.innerHTML = `🏆 Amazing! Next: <strong>${nextLevelName}</strong> mode with more cards! 🚀`;
    nextLevelBtn.innerHTML = '<i class="fas fa-arrow-right mr-2"></i> Advance to Next Level';
  }
  winModal.classList.remove("hidden");
}

// Proceed to next difficulty
function goToNextLevel() {
  winModal.classList.add("hidden");
  // check if final level completed
  if (currentLevelIndex === levelOrder.length - 1) {
    // VICTORY all levels done!
    victoryModal.classList.remove("hidden");
    return;
  }
  // move to next level
  currentLevelIndex++;
  currentDifficulty = levelOrder[currentLevelIndex];
  updateDifficultyButtonActive(currentDifficulty);
  // reset game fully
  resetGameStateForNewLevel();
  buildBoard();
}

function resetGameStateForNewLevel() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  hasFlippedCard = false;
  lockBoard = false;
  firstCard = null;
  secondCard = null;
  gameActive = true;
}

// Restart current level (same difficulty)
function restartCurrentLevel() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  hasFlippedCard = false;
  lockBoard = false;
  firstCard = secondCard = null;
  gameActive = true;
  buildBoard();  // fresh board with same difficulty
  // close modals if any
  winModal.classList.add("hidden");
  victoryModal.classList.add("hidden");
}

// Full reset from easy (start over)
function fullGameReset() {
  // reset progression
  currentLevelIndex = 0;
  currentDifficulty = levelOrder[0];
  updateDifficultyButtonActive(currentDifficulty);
  resetGameStateForNewLevel();
  buildBoard();
  victoryModal.classList.add("hidden");
  winModal.classList.add("hidden");
}

// update UI active style on difficulty buttons
function updateDifficultyButtonActive(diff) {
  diffBtns.forEach(btn => {
    const val = btn.getAttribute("data-diff");
    if (val === diff) {
      btn.classList.add("active");
    } else {
      btn.classList.remove("active");
    }
  });
}

// Manual difficulty change via buttons (only allowed if game not in progress? We'll allow restart but reset progression)
function setDifficultyAndReset(diff) {
  if (diff === currentDifficulty && currentLevelIndex === levelOrder.indexOf(diff)) {
    restartCurrentLevel();
    return;
  }
  // change difficulty manually resets progression to that level only (new journey)
  currentDifficulty = diff;
  currentLevelIndex = levelOrder.indexOf(diff);
  if (currentLevelIndex === -1) currentLevelIndex = 0;
  updateDifficultyButtonActive(currentDifficulty);
  resetGameStateForNewLevel();
  buildBoard();
  // close any open modals
  winModal.classList.add("hidden");
  victoryModal.classList.add("hidden");
}

// Light/Dark mode toggle with persistence & dynamic icons
function initTheme() {
  const isDark = localStorage.getItem("memoryTheme") === "dark";
  if (isDark) {
    document.body.classList.add("dark-mode");
    themeIcon.classList.remove("fa-moon");
    themeIcon.classList.add("fa-sun");
  } else {
    document.body.classList.remove("dark-mode");
    themeIcon.classList.remove("fa-sun");
    themeIcon.classList.add("fa-moon");
  }
}

function toggleTheme() {
  if (document.body.classList.contains("dark-mode")) {
    document.body.classList.remove("dark-mode");
    localStorage.setItem("memoryTheme", "light");
    themeIcon.classList.remove("fa-sun");
    themeIcon.classList.add("fa-moon");
  } else {
    document.body.classList.add("dark-mode");
    localStorage.setItem("memoryTheme", "dark");
    themeIcon.classList.remove("fa-moon");
    themeIcon.classList.add("fa-sun");
  }
}

// Event Listeners
restartBtn.addEventListener("click", () => {
  restartCurrentLevel();
});

nextLevelBtn.addEventListener("click", () => {
  goToNextLevel();
});

cancelModalBtn.addEventListener("click", () => {
  winModal.classList.add("hidden");
  // game stays completed, but user might restart manually
});

fullResetBtn.addEventListener("click", () => {
  fullGameReset();
});

diffBtns.forEach(btn => {
  btn.addEventListener("click", (e) => {
    const diff = btn.getAttribute("data-diff");
    setDifficultyAndReset(diff);
  });
});

themeToggle.addEventListener("click", toggleTheme);

// initial setup
initTheme();
currentLevelIndex = 0;
currentDifficulty = 'easy';
updateDifficultyButtonActive('easy');
buildBoard();

// Edge: prevent double modal when finish and also ensure progression doesn't glitch
window.addEventListener('load', () => {
  // extra responsive fix: ensure grid fits
});


  </script>
</body>

</html>
