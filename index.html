<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Memory Odyssey · Enhanced</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar flex flex-wrap items-center justify-between gap-2">
        <div class="flex items-center gap-2">
            <button class="sidebar-toggle" id="sidebarToggle">
                <i class="fas fa-bars"></i>
            </button>
            <h1 class="text-lg md:text-2xl font-extrabold drop-shadow-xl flex items-center gap-2">
                <i class="fa-solid fa-brain animate-pulse"></i>
                <span>Memory Odyssey</span>
            </h1>
        </div>
        <div class="flex items-center gap-1 md:gap-2">
            <button id="soundToggle"
                class="bg-white/20 backdrop-blur-md rounded-full w-8 h-8 md:w-10 md:h-10 flex items-center justify-center text-sm hover:bg-white/40 transition-all shadow-xl border border-white/10">
                <i id="soundIcon" class="fas fa-volume-up"></i>
            </button>
            <button id="themeToggle"
                class="bg-white/20 backdrop-blur-md rounded-full w-8 h-8 md:w-10 md:h-10 flex items-center justify-center text-sm hover:bg-white/40 transition-all shadow-xl border border-white/10">
                <i id="themeIcon" class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <div class="flex flex-1">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="mb-3 px-2">
                <div class="text-xs font-bold uppercase tracking-wider opacity-60 mb-2">Difficulty</div>
                <div class="dropdown relative" id="difficultyDropdown">
                    <button class="difficulty-btn w-full text-center" id="dropdownToggle">
                        <span id="selectedDifficultyLabel">Easy</span>
                        <i class="fas fa-chevron-down text-xs ml-1"></i>
                    </button>
                    <div class="dropdown-content" id="dropdownContent">
                        <button data-diff="easy" class="active-drop">🌱 Easy</button>
                        <button data-diff="medium">⚡ Medium</button>
                        <button data-diff="hard">🔥 Hard</button>
                    </div>
                </div>
            </div>
            <div class="px-2">
                <div class="text-xs font-bold uppercase tracking-wider opacity-60 mb-2">Levels</div>
                <div id="sidebarLevels"></div>
            </div>
            <div class="mt-auto px-2 pt-2 border-t border-white/10">
                <button id="restartBtn" class="sidebar-btn text-xs bg-white/10 hover:bg-white/20">
                    <i class="fas fa-rotate mr-1"></i> Restart
                </button>
                <button id="resetAllBtn" class="sidebar-btn text-xs bg-white/10 hover:bg-white/20 mt-1">
                    <i class="fas fa-undo mr-1"></i> Reset All
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content flex-1 p-2 md:p-4">
            <!-- Stats -->
            <div class="flex flex-wrap justify-center gap-1 md:gap-2 mb-3">
                <div class="stat-panel"><i class="fas fa-hand-peace"></i><span>MOVES: <span id="moves"
                            class="value">0</span></span></div>
                <div class="stat-panel"><i class="fas fa-hourglass-half"></i><span>TIME: <span id="time"
                            class="value">0s</span></span></div>
                <div class="stat-panel"><i class="fas fa-layer-group"></i><span><span id="difficultyLabel">Easy</span>
                        <span id="levelIndicator" class="value">1/10</span></span></div>
                <div class="stat-panel"><i class="fas fa-star"></i><span>PAIRS: <span id="pairsMatched"
                            class="value">0</span>/<span id="totalPairsSpan" class="value">0</span></span></div>
                <div class="stat-panel"><span id="levelDots" class="level-dots"></span></div>
                <div class="stat-panel" id="bestScorePanel" style="display:none;">
                    <i class="fas fa-trophy text-yellow-500"></i>
                    <span>BEST: <span id="bestScore" class="value">-</span></span>
                </div>
            </div>

            <!-- Game Board -->
            <div id="game-board" class="game-grid"></div>
        </main>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 Memory Odyssey · 6-Column Grid · All Devices</p>
    </footer>

    <!-- Modals -->
    <div id="win-modal"
        class="hidden fixed inset-0 bg-black/50 backdrop-blur-md flex items-center justify-center z-50 p-4">
        <div class="win-modal-content modal-pop">
            <div class="text-4xl md:text-6xl mb-2">🏆</div>
            <h2 class="text-xl md:text-3xl font-extrabold">Level Complete!</h2>
            <div class="star-rating" id="starRating">
                <i class="fas fa-star empty"></i>
                <i class="fas fa-star empty"></i>
                <i class="fas fa-star empty"></i>
            </div>
            <div
                class="bg-gradient-to-r from-yellow-100 to-orange-100 dark:from-gray-700 dark:to-gray-800 rounded-xl p-2 my-2 text-xs md:text-base">
                <p>✨ <strong id="finalMovesSpan">0</strong> moves &nbsp;|&nbsp; ⏱️ <strong
                        id="finalTimeSpan">0s</strong></p>
            </div>
            <div id="nextLevelInfo" class="mb-3 text-xs md:text-md font-medium"></div>
            <div id="levelStats" class="text-xs opacity-70 mb-2"></div>
            <button id="nextLevelBtn"
                class="bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 text-white font-bold py-2.5 px-5 rounded-xl transition-all shadow-lg w-full flex items-center justify-center gap-2 text-sm md:text-base"><i
                    class="fas fa-arrow-right"></i> Next Level</button>
            <button id="cancelModalBtn"
                class="mt-2 text-gray-500 hover:text-gray-700 dark:text-gray-400 text-xs md:text-sm transition">Continue
                Playing</button>
        </div>
    </div>

    <div id="victory-modal"
        class="hidden fixed inset-0 bg-black/70 backdrop-blur-xl flex items-center justify-center z-50 p-4">
        <div
            class="bg-gradient-to-br from-yellow-100 to-orange-100 dark:from-gray-800 dark:to-gray-900 rounded-2xl p-6 md:p-8 max-w-sm w-full text-center shadow-2xl modal-pop border border-white/10">
            <i class="fas fa-crown text-5xl md:text-6xl text-yellow-500 mb-2 animate-bounce"></i>
            <h2 class="text-2xl md:text-3xl font-black text-purple-700 dark:text-purple-300">🏆 COMPLETE!</h2>
            <p class="text-lg md:text-xl my-2">You conquered all 10 levels!</p>
            <div class="flex justify-center gap-1 text-2xl my-2">⭐⭐⭐⭐⭐</div>
            <p class="mb-4 text-sm md:text-base">Incredible memory unlocked ✨</p>
            <div id="victoryStats" class="text-sm mb-3"></div>
            <button id="fullResetBtn"
                class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl w-full transition flex items-center justify-center gap-2 text-sm md:text-base"><i
                    class="fas fa-play"></i> Play Again</button>
        </div>
    </div>

    <div id="toastMsg"></div>

    
</body>

</html>
