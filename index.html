<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Memory Odyssey · Glass UI</title>
  <!-- Tailwind + Font Awesome -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  
</head>
<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex flex-col items-center justify-start p-3 md:p-5 transition-colors duration-300">
  <div class="w-full max-w-6xl mx-auto">
    <!-- header with glass -->
    <div class="glass-header flex flex-wrap justify-between items-center mb-4 gap-2 rounded-2xl px-4 py-2 md:px-6 md:py-3">
      <h1 class="text-2xl md:text-5xl font-extrabold text-white drop-shadow-xl flex items-center gap-2">
        <i class="fa-solid fa-brain text-yellow-300 animate-pulse text-3xl md:text-5xl"></i>
        <span class="bg-clip-text text-transparent bg-gradient-to-r from-yellow-200 to-orange-200 text-xl md:text-5xl">Memory Odyssey</span>
      </h1>
      <button id="themeToggle" class="bg-white/20 backdrop-blur-md text-white rounded-full w-11 h-11 md:w-12 md:h-12 flex items-center justify-center text-xl hover:bg-white/40 hover:scale-105 transition-all shadow-xl border border-white/10">
        <i id="themeIcon" class="fas fa-moon"></i>
      </button>
    </div>

    <!-- difficulty pills (glass) -->
    <div class="glass-pills flex flex-wrap justify-center gap-2 md:gap-3 mb-4 p-2 md:p-3 rounded-2xl">
      <button data-diff="easy" class="difficulty-btn px-4 md:px-6 py-2 rounded-full font-bold shadow-md transition-all active">🌱 EASY <span class="text-xs ml-1 hidden sm:inline">(3x4)</span></button>
      <button data-diff="medium" class="difficulty-btn px-4 md:px-6 py-2 rounded-full font-bold shadow-md transition-all">⚡ MEDIUM <span class="text-xs ml-1 hidden sm:inline">(4x4)</span></button>
      <button data-diff="hard" class="difficulty-btn px-4 md:px-6 py-2 rounded-full font-bold shadow-md transition-all">🔥 HARD <span class="text-xs ml-1 hidden sm:inline">(4x6)</span></button>
    </div>

    <!-- stats + restart (glass) -->
    <div class="flex flex-wrap justify-center sm:justify-between items-center gap-2 md:gap-4 mb-5">
      <div class="flex flex-wrap justify-center gap-2 md:gap-3">
        <div class="stat-panel text-white font-bold shadow-lg flex items-center gap-1 md:gap-2 text-sm md:text-base"><i class="fas fa-hand-peace text-yellow-200"></i><span>MOVES: <span id="moves" class="text-lg md:text-xl">0</span></span></div>
        <div class="stat-panel text-white font-bold shadow-lg flex items-center gap-1 md:gap-2 text-sm md:text-base"><i class="fas fa-hourglass-half text-yellow-200"></i><span>TIME: <span id="time" class="text-lg md:text-xl">0s</span></span></div>
        <div class="stat-panel text-white font-bold shadow-lg flex items-center gap-1 md:gap-2 text-sm md:text-base"><i class="fas fa-layer-group text-yellow-200"></i><span>LEVEL: <span id="levelIndicator" class="text-lg md:text-xl level-badge">1/3</span></span></div>
        <div class="stat-panel text-white font-bold shadow-lg flex items-center gap-1 md:gap-2 text-sm md:text-base"><i class="fas fa-star text-yellow-200"></i><span>PAIRS: <span id="pairsMatched">0</span>/<span id="totalPairsSpan">0</span></span></div>
      </div>
      <button id="restartBtn" class="restart-btn text-indigo-700 hover:text-indigo-800 font-bold py-2 px-5 md:px-7 rounded-xl shadow-lg transition-all flex items-center gap-2 text-sm md:text-base"><i class="fas fa-arrows-rotate"></i> Restart</button>
    </div>

    <!-- board -->
    <div id="game-board" class="game-grid flex justify-center"></div>

    <!-- level complete modal (glass) -->
    <div id="win-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-lg flex items-center justify-center z-50 p-4">
      <div class="win-modal-content rounded-2xl p-6 md:p-8 max-w-sm w-full text-center shadow-2xl modal-pop">
        <div class="text-5xl md:text-6xl mb-2">🏆</div>
        <h2 class="text-2xl md:text-3xl font-extrabold text-indigo-600 dark:text-indigo-400">Level Complete!</h2>
        <div class="bg-gradient-to-r from-yellow-100 to-orange-100 dark:from-gray-700 dark:to-gray-800 rounded-xl p-3 my-3 text-sm md:text-base">
          <p>✨ <strong id="finalMovesSpan">0</strong> moves &nbsp;|&nbsp; ⏱️ <strong id="finalTimeSpan">0s</strong></p>
        </div>
        <div id="nextLevelInfo" class="mb-4 text-sm md:text-md font-medium text-gray-700 dark:text-gray-300"></div>
        <button id="nextLevelBtn" class="bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-lg w-full flex items-center justify-center gap-2 text-sm md:text-base"><i class="fas fa-arrow-right"></i> Next Level</button>
        <button id="cancelModalBtn" class="mt-3 text-gray-500 hover:text-gray-700 dark:text-gray-400 text-sm transition">Continue Playing</button>
      </div>
    </div>

    <!-- victory modal (glass) -->
    <div id="victory-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-xl flex items-center justify-center z-50 p-4">
      <div class="bg-gradient-to-br from-yellow-100 to-orange-100 dark:from-gray-800 dark:to-gray-900 rounded-2xl p-6 md:p-8 max-w-sm w-full text-center shadow-2xl modal-pop border border-white/10">
        <i class="fas fa-crown text-5xl md:text-6xl text-yellow-500 mb-2 animate-bounce"></i>
        <h2 class="text-2xl md:text-3xl font-black text-purple-700 dark:text-purple-300">🏆 GRAND MASTER</h2>
        <p class="text-lg md:text-xl my-2">You conquered all 3 dimensions!</p>
        <div class="flex justify-center gap-1 text-2xl my-2">⭐⭐⭐⭐⭐</div>
        <p class="mb-4 text-sm md:text-base text-gray-600 dark:text-gray-300">Incredible memory unlocked ✨</p>
        <button id="fullResetBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl w-full transition flex items-center justify-center gap-2 text-sm md:text-base"><i class="fas fa-play"></i> Play Again from Easy</button>
      </div>
    </div>

    <!-- toast -->
    <div id="toastMsg"></div>
  </div>

  
</body>
</html>
