<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Memory Odyssey · 10 Levels Enhanced</title>
    <!-- Tailwind + Font Awesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
 <link rel="stylesheet" href="css/style.css">
</head>

<body
    class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex flex-col items-center justify-start p-2 md:p-4 transition-colors duration-300">
    <div class="w-full max-w-6xl mx-auto">
        <!-- header with glass -->
        <div
            class="glass-header flex flex-wrap justify-between items-center mb-3 gap-2 rounded-2xl px-3 py-2 md:px-6 md:py-3">
            <h1 class="text-xl md:text-4xl font-extrabold text-white drop-shadow-xl flex items-center gap-2">
                <i class="fa-solid fa-brain text-yellow-300 animate-pulse text-2xl md:text-4xl"></i>
                <span
                    class="bg-clip-text text-transparent bg-gradient-to-r from-yellow-200 to-orange-200 text-lg md:text-4xl">Memory
                    Odyssey</span>
            </h1>
            <div class="flex items-center gap-2">
                <button id="soundToggle"
                    class="bg-white/20 backdrop-blur-md text-white rounded-full w-10 h-10 md:w-12 md:h-12 flex items-center justify-center text-lg hover:bg-white/40 hover:scale-105 transition-all shadow-xl border border-white/10">
                    <i id="soundIcon" class="fas fa-volume-up"></i>
                </button>
                <button id="themeToggle"
                    class="bg-white/20 backdrop-blur-md text-white rounded-full w-10 h-10 md:w-12 md:h-12 flex items-center justify-center text-lg hover:bg-white/40 hover:scale-105 transition-all shadow-xl border border-white/10">
                    <i id="themeIcon" class="fas fa-moon"></i>
                </button>
            </div>
        </div>

        <!-- difficulty pills (10 levels) -->
        <div class="glass-pills flex flex-wrap justify-center gap-1 md:gap-2 mb-3 p-2 rounded-2xl diff-btn-wrapper">
            <button data-diff="0"
                class="difficulty-btn px-2 md:px-4 py-1.5 rounded-full font-bold shadow-md transition-all active text-xs md:text-sm">🌟
                1</button>
            <button data-diff="1"
                class="difficulty-btn px-2 md:px-4 py-1.5 rounded-full font-bold shadow-md transition-all text-xs md:text-sm">⚡
                2</button>
            <button data-diff="2"
                class="difficulty-btn px-2 md:px-4 py-1.5 rounded-full font-bold shadow-md transition-all text-xs md:text-sm">🔥
                3</button>
            <button data-diff="3"
                class="difficulty-btn px-2 md:px-4 py-1.5 rounded-full font-bold shadow-md transition-all text-xs md:text-sm">🌀
                4</button>
            <button data-diff="4"
                class="difficulty-btn px-2 md:px-4 py-1.5 rounded-full font-bold shadow-md transition-all text-xs md:text-sm">💎
                5</button>
            <button data-diff="5"
                class="difficulty-btn px-2 md:px-4 py-1.5 rounded-full font-bold shadow-md transition-all text-xs md:text-sm">🌊
                6</button>
            <button data-diff="6"
                class="difficulty-btn px-2 md:px-4 py-1.5 rounded-full font-bold shadow-md transition-all text-xs md:text-sm">🌙
                7</button>
            <button data-diff="7"
                class="difficulty-btn px-2 md:px-4 py-1.5 rounded-full font-bold shadow-md transition-all text-xs md:text-sm">⭐
                8</button>
            <button data-diff="8"
                class="difficulty-btn px-2 md:px-4 py-1.5 rounded-full font-bold shadow-md transition-all text-xs md:text-sm">👑
                9</button>
            <button data-diff="9"
                class="difficulty-btn px-2 md:px-4 py-1.5 rounded-full font-bold shadow-md transition-all text-xs md:text-sm">🏆
                10</button>
        </div>

        <!-- stats + restart (glass) -->
        <div class="flex flex-wrap justify-center sm:justify-between items-center gap-1 md:gap-3 mb-3">
            <div class="flex flex-wrap justify-center gap-1 md:gap-2">
                <div class="stat-panel text-white font-bold shadow-lg flex items-center gap-1 text-xs md:text-sm"><i
                        class="fas fa-hand-peace text-yellow-200"></i><span>MOVES: <span id="moves"
                            class="text-sm md:text-lg">0</span></span></div>
                <div class="stat-panel text-white font-bold shadow-lg flex items-center gap-1 text-xs md:text-sm"><i
                        class="fas fa-hourglass-half text-yellow-200"></i><span>TIME: <span id="time"
                            class="text-sm md:text-lg">0s</span></span></div>
                <div class="stat-panel text-white font-bold shadow-lg flex items-center gap-1 text-xs md:text-sm">
                    <i class="fas fa-layer-group text-yellow-200"></i>
                    <span>LEVEL: <span id="levelIndicator" class="text-sm md:text-lg level-badge">1/10</span></span>
                </div>
                <div class="stat-panel text-white font-bold shadow-lg flex items-center gap-1 text-xs md:text-sm"><i
                        class="fas fa-star text-yellow-200"></i><span>PAIRS: <span id="pairsMatched">0</span>/<span
                            id="totalPairsSpan">0</span></span></div>
            </div>
            <div class="flex items-center gap-2">
                <div id="levelDots" class="level-dots"></div>
                <button id="restartBtn"
                    class="restart-btn text-indigo-700 hover:text-indigo-800 font-bold py-1.5 px-3 md:px-5 rounded-xl shadow-lg transition-all flex items-center gap-1 md:gap-2 text-xs md:text-sm"><i
                        class="fas fa-arrows-rotate"></i> <span class="hidden xs:inline">Restart</span></button>
            </div>
        </div>

        <!-- board -->
        <div id="game-board" class="game-grid flex justify-center"></div>

        <!-- level complete modal -->
        <div id="win-modal"
            class="hidden fixed inset-0 bg-black/60 backdrop-blur-lg flex items-center justify-center z-50 p-4">
            <div class="win-modal-content rounded-2xl p-5 md:p-8 max-w-sm w-full text-center shadow-2xl modal-pop">
                <div class="text-4xl md:text-6xl mb-2">🏆</div>
                <h2 class="text-xl md:text-3xl font-extrabold text-indigo-600 dark:text-indigo-400">Level Complete!</h2>
                <div class="star-rating" id="starRating">
                    <i class="fas fa-star empty"></i>
                    <i class="fas fa-star empty"></i>
                    <i class="fas fa-star empty"></i>
                </div>
                <div
                    class="bg-gradient-to-r from-yellow-100 to-orange-100 dark:from-gray-700 dark:to-gray-800 rounded-xl p-2 my-2 text-xs md:text-base">
                    <p>✨ <strong id="finalMovesSpan">0</strong> moves &nbsp;|&nbsp; ⏱️ <strong
                            id="finalTimeSpan">0s</strong></p>
                </div>
                <div id="nextLevelInfo" class="mb-3 text-xs md:text-md font-medium text-gray-700 dark:text-gray-300">
                </div>
                <button id="nextLevelBtn"
                    class="bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 text-white font-bold py-2.5 px-5 rounded-xl transition-all shadow-lg w-full flex items-center justify-center gap-2 text-sm md:text-base"><i
                        class="fas fa-arrow-right"></i> Next Level</button>
                <button id="cancelModalBtn"
                    class="mt-2 text-gray-500 hover:text-gray-700 dark:text-gray-400 text-xs md:text-sm transition">Continue
                    Playing</button>
            </div>
        </div>

        <!-- victory modal -->
        <div id="victory-modal"
            class="hidden fixed inset-0 bg-black/70 backdrop-blur-xl flex items-center justify-center z-50 p-4">
            <div
                class="bg-gradient-to-br from-yellow-100 to-orange-100 dark:from-gray-800 dark:to-gray-900 rounded-2xl p-6 md:p-8 max-w-sm w-full text-center shadow-2xl modal-pop border border-white/10">
                <i class="fas fa-crown text-5xl md:text-6xl text-yellow-500 mb-2 animate-bounce"></i>
                <h2 class="text-2xl md:text-3xl font-black text-purple-700 dark:text-purple-300">🏆 GRAND MASTER</h2>
                <p class="text-lg md:text-xl my-2">You conquered all 10 levels!</p>
                <div class="flex justify-center gap-1 text-2xl my-2">⭐⭐⭐⭐⭐</div>
                <p class="mb-4 text-sm md:text-base text-gray-600 dark:text-gray-300">Incredible memory unlocked ✨</p>
                <button id="fullResetBtn"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl w-full transition flex items-center justify-center gap-2 text-sm md:text-base"><i
                        class="fas fa-play"></i> Play Again from Level 1</button>
            </div>
        </div>

        <!-- toast -->
        <div id="toastMsg"></div>
    </div>

    
</body>

</html>
