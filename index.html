<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Memory Odyssey · Progressive</title>
  <!-- Tailwind + Font Awesome -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ----- global reset & better touch ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      transition: background 0.3s, color 0.2s;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    /* dark mode body override (inline for reliability) */
    body.dark-mode {
      background: linear-gradient(145deg, #0b1120, #141d3a, #1a153a) !important;
    }

    body.dark-mode .stat-panel {
      background: rgba(10, 14, 30, 0.7);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 215, 0, 0.15);
    }

    body.dark-mode .card-back {
      background: linear-gradient(145deg, #28344a, #1a2538);
      border: 1px solid rgba(255, 215, 0, 0.2);
    }

    body.dark-mode .card-front {
      background: linear-gradient(145deg, #fbbf24, #f59e0b);
      color: #13162b;
    }

    body.dark-mode .difficulty-btn {
      background: #1f2a3f;
      color: #cbd5f0;
      border: 1px solid #3d4b66;
    }

    body.dark-mode .difficulty-btn.active {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      border-color: #a78bfa;
      box-shadow: 0 0 20px #7c3aed80;
    }

    body.dark-mode .restart-btn {
      background: #2a3850;
      color: #f0f4ff;
    }

    body.dark-mode .win-modal-content {
      background: linear-gradient(145deg, #1a2642, #0e162b);
      color: #f0f4ff;
    }

    body.dark-mode .next-level-card {
      background: #111b30;
    }

    /* ----- card 3D flip ----- */
    .card {
      perspective: 1200px;
      cursor: pointer;
      aspect-ratio: 1/1;
      transition: transform 0.15s ease;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(0.23, 1, 0.32, 1);
      border-radius: 1.2rem;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front,
    .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
    }

    .card-front {
      background: linear-gradient(145deg, #ffd966, #ffb347);
      transform: rotateY(180deg);
      color: #2c2b1f;
      font-weight: 700;
    }

    .card-back {
      background: linear-gradient(145deg, #ffffff, #f1f5f9);
      transform: rotateY(0deg);
      border: 2px solid rgba(59, 130, 246, 0.3);
    }

    .card.matched {
      opacity: 0.6;
      cursor: default;
      filter: drop-shadow(0 0 8px gold);
      transform: scale(0.96);
      transition: 0.2s;
    }

    .card.matched .card-front {
      animation: matchGlow 0.5s ease;
    }

    @keyframes matchGlow {
      0% {
        transform: scale(1);
        filter: brightness(1);
      }

      50% {
        transform: scale(1.08);
        filter: brightness(1.2);
        text-shadow: 0 0 10px gold;
      }

      100% {
        transform: scale(1);
        filter: brightness(1);
      }
    }

    /* ----- responsive grids (mobile-first) ----- */
    .game-grid {
      display: grid;
      gap: 0.65rem;
      justify-content: center;
      margin: 0.5rem auto;
      width: 100%;
      max-width: 700px;
    }

    /* default fallback: easy grid */
    .grid-easy {
      grid-template-columns: repeat(4, 1fr);
    }

    .grid-medium {
      grid-template-columns: repeat(4, 1fr);
    }

    .grid-hard {
      grid-template-columns: repeat(4, 1fr);
    }

    /* responsive sizes: cards shrink gracefully */
    .card {
      min-height: 70px;
    }

    .card-front,
    .card-back {
      font-size: 1.8rem;
    }

    @media (min-width: 480px) {
      .grid-easy {
        grid-template-columns: repeat(4, minmax(80px, 110px));
      }

      .grid-medium {
        grid-template-columns: repeat(4, minmax(85px, 115px));
      }

      .grid-hard {
        grid-template-columns: repeat(6, minmax(75px, 100px));
      }

      .card-front,
      .card-back {
        font-size: 2rem;
      }
    }

    @media (min-width: 768px) {
      .grid-easy {
        grid-template-columns: repeat(4, minmax(100px, 130px));
      }

      .grid-medium {
        grid-template-columns: repeat(4, minmax(105px, 135px));
      }

      .grid-hard {
        grid-template-columns: repeat(6, minmax(95px, 120px));
      }

      .card-front,
      .card-back {
        font-size: 2.4rem;
      }
    }

    /* small phones: tighter */
    @media (max-width: 420px) {
      .game-grid {
        gap: 0.4rem;
      }

      .card {
        min-height: 60px;
      }

      .card-front,
      .card-back {
        font-size: 1.4rem;
        border-radius: 0.9rem;
      }

      .stat-panel {
        padding: 0.4rem 0.8rem;
        font-size: 0.8rem;
      }

      .difficulty-btn {
        font-size: 0.75rem;
        padding: 0.4rem 0.8rem;
      }
    }

    @media (max-width: 360px) {

      .card-front,
      .card-back {
        font-size: 1.1rem;
      }

      .stat-panel {
        font-size: 0.7rem;
        padding: 0.3rem 0.5rem;
      }
    }

    /* ----- UI components ----- */
    .difficulty-btn {
      transition: all 0.2s;
      font-weight: 700;
      backdrop-filter: blur(4px);
    }

    .difficulty-btn.active {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      transform: scale(1.02);
      box-shadow: 0 8px 20px #3b82f680;
    }

    .stat-panel {
      backdrop-filter: blur(8px);
      background: rgba(255, 255, 255, 0.25);
      border-radius: 1.2rem;
      transition: 0.2s;
      padding: 0.5rem 1rem;
    }

    .modal-pop {
      animation: modalFade 0.3s ease-out;
    }

    @keyframes modalFade {
      from {
        opacity: 0;
        transform: scale(0.92);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .win-modal-content {
      background: white;
      border-radius: 2rem;
    }

    .restart-btn {
      transition: 0.2s;
    }

    .restart-btn:active {
      transform: scale(0.94);
    }

    button {
      cursor: pointer;
    }

    /* toast */
    #toastMsg {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      color: white;
      padding: 0.6rem 1.6rem;
      border-radius: 40px;
      font-size: 0.95rem;
      opacity: 0;
      transition: opacity 0.3s, transform 0.2s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    #toastMsg.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<body
  class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex flex-col items-center justify-start p-3 md:p-5 transition-colors duration-300">
  <div class="w-full max-w-6xl mx-auto">
    <!-- header -->
    <div class="flex flex-wrap justify-between items-center mb-3 gap-2">
      <h1 class="text-2xl md:text-5xl font-extrabold text-white drop-shadow-xl flex items-center gap-2">
        <i class="fa-solid fa-brain text-yellow-300 animate-pulse text-3xl md:text-5xl"></i>
        <span
          class="bg-clip-text text-transparent bg-gradient-to-r from-yellow-200 to-orange-200 text-xl md:text-5xl">Memory
          Odyssey</span>
      </h1>
      <button id="themeToggle"
        class="bg-white/30 backdrop-blur-md text-white rounded-full w-11 h-11 md:w-12 md:h-12 flex items-center justify-center text-xl hover:bg-white/50 hover:scale-105 transition-all shadow-xl">
        <i id="themeIcon" class="fas fa-moon"></i>
      </button>
    </div>

    <!-- difficulty pills -->
    <div
      class="flex flex-wrap justify-center gap-2 md:gap-3 mb-4 bg-white/20 backdrop-blur-lg p-2 md:p-3 rounded-2xl shadow-lg">
      <button data-diff="easy"
        class="difficulty-btn px-4 md:px-6 py-2 rounded-full font-bold bg-white/90 text-indigo-800 shadow-md transition-all active">🌱
        EASY <span class="text-xs ml-1 hidden sm:inline">(3x4)</span></button>
      <button data-diff="medium"
        class="difficulty-btn px-4 md:px-6 py-2 rounded-full font-bold bg-white/90 text-indigo-800 shadow-md transition-all">⚡
        MEDIUM <span class="text-xs ml-1 hidden sm:inline">(4x4)</span></button>
      <button data-diff="hard"
        class="difficulty-btn px-4 md:px-6 py-2 rounded-full font-bold bg-white/90 text-indigo-800 shadow-md transition-all">🔥
        HARD <span class="text-xs ml-1 hidden sm:inline">(4x6)</span></button>
    </div>

    <!-- stats + restart -->
    <div class="flex flex-wrap justify-center sm:justify-between items-center gap-2 md:gap-4 mb-4">
      <div class="flex flex-wrap justify-center gap-2 md:gap-3">
        <div class="stat-panel text-white font-bold shadow-lg flex items-center gap-1 md:gap-2 text-sm md:text-base"><i
            class="fas fa-hand-peace text-yellow-200"></i><span>MOVES: <span id="moves"
              class="text-lg md:text-xl">0</span></span></div>
        <div class="stat-panel text-white font-bold shadow-lg flex items-center gap-1 md:gap-2 text-sm md:text-base"><i
            class="fas fa-hourglass-half text-yellow-200"></i><span>TIME: <span id="time"
              class="text-lg md:text-xl">0s</span></span></div>
        <div class="stat-panel text-white font-bold shadow-lg flex items-center gap-1 md:gap-2 text-sm md:text-base"><i
            class="fas fa-layer-group text-yellow-200"></i><span>LEVEL: <span id="levelIndicator"
              class="text-lg md:text-xl">1/3</span></span></div>
        <div class="stat-panel text-white font-bold shadow-lg flex items-center gap-1 md:gap-2 text-sm md:text-base"><i
            class="fas fa-star text-yellow-200"></i><span>PAIRS: <span id="pairsMatched">0</span>/<span
              id="totalPairsSpan">0</span></span></div>
      </div>
      <button id="restartBtn"
        class="restart-btn bg-white text-indigo-700 hover:bg-indigo-100 font-bold py-2 px-5 md:px-7 rounded-xl shadow-lg transition-all flex items-center gap-2 text-sm md:text-base"><i
          class="fas fa-arrows-rotate"></i> Restart</button>
    </div>

    <!-- board -->
    <div id="game-board" class="game-grid flex justify-center"></div>

    <!-- level complete modal -->
    <div id="win-modal"
      class="hidden fixed inset-0 bg-black/70 backdrop-blur-md flex items-center justify-center z-50 p-4">
      <div class="win-modal-content bg-white rounded-2xl p-6 md:p-8 max-w-sm w-full text-center shadow-2xl modal-pop">
        <div class="text-5xl md:text-6xl mb-2">🏆</div>
        <h2 class="text-2xl md:text-3xl font-extrabold text-indigo-600 dark:text-indigo-400">Level Complete!</h2>
        <div
          class="bg-gradient-to-r from-yellow-100 to-orange-100 dark:from-gray-700 dark:to-gray-800 rounded-xl p-3 my-3 text-sm md:text-base">
          <p>✨ <strong id="finalMovesSpan">0</strong> moves &nbsp;|&nbsp; ⏱️ <strong id="finalTimeSpan">0s</strong></p>
        </div>
        <div id="nextLevelInfo" class="mb-4 text-sm md:text-md font-medium text-gray-700 dark:text-gray-300"></div>
        <button id="nextLevelBtn"
          class="bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-lg w-full flex items-center justify-center gap-2 text-sm md:text-base"><i
            class="fas fa-arrow-right"></i> Next Level</button>
        <button id="cancelModalBtn" class="mt-3 text-gray-500 hover:text-gray-700 dark:text-gray-400 text-sm">Continue
          Playing</button>
      </div>
    </div>

    <!-- victory modal -->
    <div id="victory-modal"
      class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center z-50 p-4">
      <div
        class="bg-gradient-to-br from-yellow-100 to-orange-100 dark:from-gray-800 dark:to-gray-900 rounded-2xl p-6 md:p-8 max-w-sm w-full text-center shadow-2xl modal-pop">
        <i class="fas fa-crown text-5xl md:text-6xl text-yellow-500 mb-2 animate-bounce"></i>
        <h2 class="text-2xl md:text-3xl font-black text-purple-700 dark:text-purple-300">🏆 GRAND MASTER</h2>
        <p class="text-lg md:text-xl my-2">You conquered all 3 dimensions!</p>
        <div class="flex justify-center gap-1 text-2xl my-2">⭐⭐⭐⭐⭐</div>
        <p class="mb-4 text-sm md:text-base text-gray-600 dark:text-gray-300">Incredible memory unlocked ✨</p>
        <button id="fullResetBtn"
          class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl w-full transition flex items-center justify-center gap-2 text-sm md:text-base"><i
            class="fas fa-play"></i> Play Again from Easy</button>
      </div>
    </div>

    <!-- toast -->
    <div id="toastMsg"></div>
  </div>

  <script src="js/script.js">
    
(function () {
  "use strict";
  // ----- state -----
  const levelOrder = ['easy', 'medium', 'hard'];
  let currentLevelIndex = 0;
  let currentDifficulty = 'easy';
  let cardsArray = [];
  let hasFlippedCard = false, lockBoard = false, firstCard = null, secondCard = null;
  let moves = 0, secondsElapsed = 0, matchedCount = 0, totalPairs = 0;
  let timerInterval = null, gameActive = true;

  // DOM refs
  const board = document.getElementById('game-board');
  const movesSpan = document.getElementById('moves');
  const timeSpan = document.getElementById('time');
  const restartBtn = document.getElementById('restartBtn');
  const winModal = document.getElementById('win-modal');
  const victoryModal = document.getElementById('victory-modal');
  const nextBtn = document.getElementById('nextLevelBtn');
  const cancelBtn = document.getElementById('cancelModalBtn');
  const finalMoves = document.getElementById('finalMovesSpan');
  const finalTime = document.getElementById('finalTimeSpan');
  const nextInfo = document.getElementById('nextLevelInfo');
  const levelInd = document.getElementById('levelIndicator');
  const fullResetBtn = document.getElementById('fullResetBtn');
  const themeToggle = document.getElementById('themeToggle');
  const themeIcon = document.getElementById('themeIcon');
  const pairsMatched = document.getElementById('pairsMatched');
  const totalPairsSpan = document.getElementById('totalPairsSpan');
  const diffBtns = document.querySelectorAll('[data-diff]');
  const toast = document.getElementById('toastMsg');

  function showToast(msg, dur = 1800) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._hide);
    toast._hide = setTimeout(() => toast.classList.remove('show'), dur);
  }

  const config = {
    easy: { rows: 3, cols: 4, pairs: 6, gridClass: 'grid-easy' },
    medium: { rows: 4, cols: 4, pairs: 8, gridClass: 'grid-medium' },
    hard: { rows: 4, cols: 6, pairs: 12, gridClass: 'grid-hard' }
  };
  const emojis = ["🐶", "🐱", "🐭", "🐹", "🐰", "🦊", "🐻", "🐼", "🐨", "🐯", "🦁", "🐮", "🐸", "🐵", "🐔", "🐧", "🐦", "🐴", "🦋", "🐝", "🐳", "🐬", "🦄", "🐙", "🍎", "🍒", "🍉", "🍕", "⚽", "🏀", "🎈", "🚀", "🌈", "⭐", "❄️", "🎵", "💎", "🔮"];

  function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]]; } return a; }

  function generateDeck() {
    const needed = config[currentDifficulty].pairs;
    let pool = shuffle([...emojis]).slice(0, needed);
    let deck = shuffle([...pool, ...pool]);
    return deck;
  }

  function updatePairCounter() { pairsMatched.textContent = matchedCount; totalPairsSpan.textContent = totalPairs; }

  function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }

  function resetBoardState() { hasFlippedCard = false; firstCard = null; secondCard = null; }

  function buildBoard() {
    board.innerHTML = '';
    const cfg = config[currentDifficulty];
    const deck = generateDeck();
    totalPairs = cfg.pairs; matchedCount = 0; moves = 0; secondsElapsed = 0;
    stopTimer(); timerInterval = null;
    movesSpan.textContent = '0'; timeSpan.textContent = '0s'; updatePairCounter();
    hasFlippedCard = false; lockBoard = false; firstCard = secondCard = null; gameActive = true;

    board.className = `game-grid ${cfg.gridClass}`;
    cardsArray = [];
    deck.forEach((emoji, idx) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.idx = idx;
      card.dataset.emoji = emoji;
      const inner = document.createElement('div');
      inner.className = 'card-inner';
      inner.innerHTML = `<div class="card-front">${emoji}</div><div class="card-back"><i class="fas fa-question-circle text-3xl text-indigo-300"></i></div>`;
      card.appendChild(inner);
      card.addEventListener('click', () => handleCardClick(card));
      board.appendChild(card);
      cardsArray.push(card);
    });
    levelInd.textContent = `${currentLevelIndex + 1}/${levelOrder.length}`;
  }

  function startTimerIfNeeded() {
    if (!timerInterval && gameActive && moves === 0) {
      timerInterval = setInterval(() => {
        if (gameActive) { secondsElapsed++; timeSpan.textContent = secondsElapsed + 's'; }
      }, 1000);
    }
  }

  function handleCardClick(card) {
    if (lockBoard || !gameActive) return;
    if (card.classList.contains('matched') || card.classList.contains('flipped')) return;
    startTimerIfNeeded();

    if (!hasFlippedCard) {
      card.classList.add('flipped');
      hasFlippedCard = true;
      firstCard = card;
      return;
    }
    secondCard = card;
    card.classList.add('flipped');
    moves++;
    movesSpan.textContent = moves;

    const match = firstCard.dataset.emoji === secondCard.dataset.emoji;
    if (match) {
      firstCard.classList.add('matched'); secondCard.classList.add('matched');
      matchedCount++; updatePairCounter();
      resetBoardState();
      if (matchedCount === totalPairs) levelComplete();
    } else {
      lockBoard = true;
      setTimeout(() => {
        if (firstCard) firstCard.classList.remove('flipped');
        if (secondCard) secondCard.classList.remove('flipped');
        resetBoardState();
        lockBoard = false;
      }, 750);
    }
  }

  function levelComplete() {
    if (!gameActive) return;
    gameActive = false; stopTimer();
    finalMoves.textContent = moves;
    finalTime.textContent = secondsElapsed + 's';
    const last = currentLevelIndex === levelOrder.length - 1;
    if (last) {
      nextInfo.innerHTML = '🌟 Legendary! You\'ve dominated every mode! 🌟<br>Claim your final trophy!';
      nextBtn.innerHTML = '<i class="fas fa-crown mr-2"></i> Claim Victory';
    } else {
      const nxt = levelOrder[currentLevelIndex + 1].toUpperCase();
      const p = config[levelOrder[currentLevelIndex + 1]].pairs;
      nextInfo.innerHTML = `🎉 Incredible! Next: <strong>${nxt}</strong> mode with <strong>${p} pairs</strong>! 🚀`;
      nextBtn.innerHTML = '<i class="fas fa-arrow-right mr-2"></i> Advance to Next Level';
    }
    winModal.classList.remove('hidden');
  }

  function goToNextLevel() {
    winModal.classList.add('hidden');
    if (currentLevelIndex === levelOrder.length - 1) { victoryModal.classList.remove('hidden'); return; }
    currentLevelIndex++;
    currentDifficulty = levelOrder[currentLevelIndex];
    updateDiffActive(currentDifficulty);
    resetGameStateForNewLevel();
    buildBoard();
    showToast(`✨ Moving to ${currentDifficulty.toUpperCase()} mode!`, 1800);
  }

  function resetGameStateForNewLevel() { stopTimer(); timerInterval = null; hasFlippedCard = false; lockBoard = false; firstCard = null; secondCard = null; gameActive = true; }

  function restartCurrentLevel() { stopTimer(); timerInterval = null; hasFlippedCard = false; lockBoard = false; firstCard = secondCard = null; gameActive = true; buildBoard(); winModal.classList.add('hidden'); victoryModal.classList.add('hidden'); showToast('🔄 Level restarted!', 1200); }

  function fullGameReset() { currentLevelIndex = 0; currentDifficulty = 'easy'; updateDiffActive('easy'); resetGameStateForNewLevel(); buildBoard(); victoryModal.classList.add('hidden'); winModal.classList.add('hidden'); showToast('🌟 Fresh journey! Easy mode 🌟', 1600); }

  function updateDiffActive(diff) { diffBtns.forEach(b => { const v = b.dataset.diff; if (v === diff) b.classList.add('active'); else b.classList.remove('active'); }); }

  function setDifficultyAndReset(diff) {
    if (diff === currentDifficulty && currentLevelIndex === levelOrder.indexOf(diff)) { restartCurrentLevel(); return; }
    currentDifficulty = diff; currentLevelIndex = levelOrder.indexOf(diff); if (currentLevelIndex < 0) currentLevelIndex = 0;
    updateDiffActive(currentDifficulty);
    resetGameStateForNewLevel();
    buildBoard();
    winModal.classList.add('hidden'); victoryModal.classList.add('hidden');
    showToast(`🎮 Switched to ${diff.toUpperCase()} mode.`, 1500);
  }

  // theme
  function initTheme() { const dark = localStorage.getItem('memoryTheme') === 'dark'; document.body.classList.toggle('dark-mode', dark); themeIcon.className = dark ? 'fas fa-sun' : 'fas fa-moon'; }
  function toggleTheme() { const dark = document.body.classList.toggle('dark-mode'); localStorage.setItem('memoryTheme', dark ? 'dark' : 'light'); themeIcon.className = dark ? 'fas fa-sun' : 'fas fa-moon'; showToast(dark ? '🌙 Dark mode' : '☀️ Light mode', 1000); }

  // event listeners
  restartBtn.addEventListener('click', restartCurrentLevel);
  nextBtn.addEventListener('click', goToNextLevel);
  cancelBtn.addEventListener('click', () => winModal.classList.add('hidden'));
  fullResetBtn.addEventListener('click', fullGameReset);
  themeToggle.addEventListener('click', toggleTheme);
  diffBtns.forEach(b => b.addEventListener('click', () => setDifficultyAndReset(b.dataset.diff)));

  // init
  initTheme();
  currentLevelIndex = 0; currentDifficulty = 'easy'; updateDiffActive('easy'); buildBoard();
})();

  </script>
</body>

</html>
